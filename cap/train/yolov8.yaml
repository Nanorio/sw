# 1. 数据集根目录 (Dataset root)
# 建议使用绝对路径，或者相对于你运行 Python 脚本的路径
path: /home/nvidia/CAP/train/datasets

# 2. 训练、验证和测试集的图片路径 (相对于上面的 path)
train: train/images  # 训练集图片
val: val/images      # 验证集图片（必须要有）
test: test/images    # 测试集图片

# 3. 类别字典 (Names)
# 键 (Key) 是类别 ID（从 0 开始），值 (Value) 是类别名称
names:
  0: blueLight
