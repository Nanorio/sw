# matlab标定直接输出的标定参数
# config/camera_params.yaml

# 图像分辨率(仅单目) [width, height],要与标定时用到的数据一致
imageSize: [640, 480]

# 左相机参数
left:
  matrix: # 未转置内参矩阵(matlab直接导出),即右上角全是0，opencv用的内参矩阵是右下角全是0的形式
    - [658.0029, 0.0, 0]
    - [0.0, 660.2837, 0]
    - [331.3884, 233.8665, 1.0]
  distortion: 
    - [0.6398, -0.9881, 0.0022, 0.0027, 0.0] # k1,k2,p1,p2,k3

# 右相机参数
right:
  matrix: # 未转置内参矩阵(matlab直接导出),即右上角全是0，opencv用的内参矩阵是右下角全是0的形式
    - [656.0077, 0.0, 0.0]
    - [0.0, 658.0255, 0.0]
    - [313.5444, 234.2990, 1.0]
  distortion: 
    - [0.6567, -1.0982, 0.0024, -0.0043, 0.0] # k1,k2,p1,p2,k3

# 立体标定参数 (旋转矩阵与平移向量)
stereo:
  Rotation:
    - [0.9999, 0.0003, -0.0109]
    - [-0.0003, 1.0000, 0.0008]
    - [ 0.0109, -0.0008, 0.9999]
  Translation:
    - [-61.9624, 0.8920, 0.4837] # 单位mm
  Q:
    - [1.0, 0.0, 0.0, -320.0]
    - [0.0, 1.0, 0.0, -240.0]
    - [0.0, 0.0, 0.0, 625.0]
    - [0.0, 0.0, -0.016138, 0.0]